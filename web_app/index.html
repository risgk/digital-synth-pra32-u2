<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRA32-U2 Web Synth</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #pedal-container {
            background-color: #2b2b2b;
            border: 4px solid #444;
            border-radius: 10px;
            padding: 30px;
            width: 90%;
            max-width: 1200px;
            box-shadow: 10px 10px 0px #000;
        }

        h1 {
            text-align: center;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 800px) {
            .controls {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #444;
            height: 10px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #00ff00;
            cursor: pointer;
        }

        #status {
            margin-top: 20px;
            padding: 10px;
            background: #000;
            border: 1px solid #00ff00;
            text-align: center;
        }

        #start-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            text-transform: uppercase;
        }

        #start-btn:hover {
            background: #00cc00;
        }

        .keyboard-wrapper {
            margin-top: 20px;
        }

        .keyboard {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .key {
            width: 40px;
            height: 120px;
            background: #fff;
            border: 1px solid #000;
            cursor: pointer;
            box-sizing: border-box;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .key.black {
            background: #000;
            height: 80px;
            width: 30px;
            margin-left: -15px;
            margin-right: -15px;
            z-index: 2;
        }

        .key:active, .key.active {
            background: #00ff00;
        }
        .key.black:active, .key.black.active {
            background: #00aa00;
        }

        .octave-controls {
            display: none;
        }

        @media (max-width: 900px) {
            #pedal-container {
                padding: 16px;
                width: calc(100% - 20px);
            }

            .octave-controls {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                margin-bottom: 10px;
            }

            .octave-btn {
                border: 1px solid #00ff00;
                background: #222;
                color: #00ff00;
                font-family: inherit;
                font-size: 1.1em;
                font-weight: bold;
                padding: 6px 12px;
                cursor: pointer;
            }

            #octave-display {
                min-width: 72px;
                text-align: center;
                font-weight: bold;
            }

            .keyboard.mobile {
                position: relative;
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
                max-width: 360px;
                margin: 0 auto;
                gap: 0;
            }

            .keyboard.mobile .key {
                width: 100%;
                height: 36px;
                border-bottom: 1px solid #222;
            }

            .keyboard.mobile .key.black {
                width: 62%;
                height: 24px;
                margin: -12px 0 -12px auto;
                z-index: 3;
                border-left: 1px solid #222;
            }
        }
    </style>
</head>
<body>

    <div id="pedal-container">
        <h1>PRA32-U2 Web Synth</h1>

        <button id="start-btn">INIT AUDIO ENGINE</button>

        <div id="status">Status: Waiting to start...</div>

        <div style="margin-top: 20px; text-align: center;">
            <label for="preset-select" style="margin-right: 10px;">PRESET:</label>
            <select id="preset-select" style="background: #444; color: #00ff00; border: 1px solid #00ff00; padding: 5px; font-family: inherit; font-weight: bold; cursor: pointer;">
                <option value="-1">-- Custom --</option>
                <option value="0">0: Initialization</option>
                <option value="1">1: Sync Lead</option>
                <option value="2">2: Synth Brass</option>
                <option value="3">3: Pluck Synth</option>
                <option value="4">4: Mono Synth</option>
                <option value="5">5: Synth Bass 1</option>
                <option value="6">6: Synth Bass 2</option>
                <option value="7">7: Synth Bass 3</option>
            </select>
        </div>

        <div id="synth-controls" class="controls">
            <!-- Controls generated in JS -->
        </div>

        <div class="keyboard-wrapper">
            <div class="octave-controls" id="octave-controls">
                <button class="octave-btn" id="octave-down">OCT -</button>
                <span id="octave-display">C4</span>
                <button class="octave-btn" id="octave-up">OCT +</button>
            </div>
            <div class="keyboard" id="keyboard">
                <!-- Keys generated in JS -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
