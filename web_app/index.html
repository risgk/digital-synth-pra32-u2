<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRA32-U2 Web Synth</title>
    <style>
        /* Mobile-First & Hardware Aesthetic */
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2a2a2a;
            --text-color: #e0e0e0;
            --accent-color: #00ff00; /* Neon green */
            --accent-dim: #004400;
            --mutate-color: #ff0055; /* Neon pink for chaos */
            --border-color: #444;
            --fader-bg: #111;
            --fader-thumb: #666;
        }

        * {
            box-sizing: border-box;
            touch-action: pan-y; /* Prevent pinch zoom but allow vertical scroll if needed */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace; /* Monospace for technical feel */
            overflow: hidden; /* Fixed app layout */
        }

        .synth-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
        }

        /* Header & Mutate Button */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--accent-color);
            text-shadow: 0 0 5px var(--accent-dim);
        }

        .mutate-btn {
            background-color: var(--mutate-color);
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 4px;
            box-shadow: 0 4px 0 #990033;
            cursor: pointer;
            text-transform: uppercase;
        }
        .mutate-btn:active {
            box-shadow: 0 0 0 #990033;
            transform: translateY(4px);
        }

        /* Preset & Status */
        .top-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }
        .preset-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        select#presetSelect {
            flex-grow: 1;
            background-color: var(--bg-color);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 8px;
            font-family: inherit;
        }
        .status-bar {
            text-align: center;
            font-size: 0.8rem;
            padding: 5px;
            border: 1px solid var(--accent-dim);
            color: var(--accent-color);
        }

        /* Tabs Navigation */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .tab-btn {
            flex: 1;
            min-width: 60px;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 5px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px 4px 0 0;
            text-align: center;
        }
        .tab-btn.active {
            background-color: var(--border-color);
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        /* Tab Content Area */
        .tab-content {
            display: none;
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 0 0 4px 4px;
            background-color: var(--bg-color);
            /* Setup for grid layout inside */
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            align-content: start;
            padding-bottom: 20px;
        }
        .tab-content.active {
            display: grid;
        }

        /* Faders & Knobs */
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 4px;
        }
        .control-label {
            font-size: 0.75rem;
            margin-bottom: 8px;
            text-align: center;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            cursor: default;
        }
        .control-value {
            font-size: 0.7rem;
            margin-top: 8px;
            background-color: #000;
            color: var(--accent-color);
            padding: 2px 6px;
            border-radius: 2px;
            min-width: 30px;
            text-align: center;
        }

        /* Native Slider Styling to look like Faders */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        /* Thumb */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 4px;
            background: var(--fader-thumb);
            cursor: pointer;
            margin-top: -10px; /* Centering relative to track */
            border: 2px solid #888;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        /* Track */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--fader-bg);
            border-radius: 2px;
            border: 1px solid #000;
        }

        /* Fader specific classes */
        .fader-horizontal {
            width: 100%;
            margin: 10px 0;
        }

        /* Vertical fader trick */
        .fader-vertical-container {
            width: 30px;
            height: 100px; /* Explicit height for layout */
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px 0;
        }
        .fader-vertical {
            width: 100px;
            transform: rotate(-90deg);
        }

        /* Fixed Keyboard at Bottom */
        #keyboard {
            display: flex;
            height: 80px;
            width: 100%;
            background-color: #111;
            border-top: 2px solid var(--border-color);
            margin-top: 10px;
            position: relative;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .key {
            flex: 1;
            border: 1px solid #000;
            border-radius: 0 0 4px 4px;
            box-sizing: border-box;
            cursor: pointer;
        }

        .white-key {
            background-color: #fff;
            z-index: 1;
        }

        .white-key.active {
            background-color: #ccc;
        }

        .black-key {
            background-color: #000;
            width: 6%;
            height: 60%;
            position: absolute;
            z-index: 2;
            border-radius: 0 0 3px 3px;
        }

        .black-key.active {
            background-color: #333;
        }

        /* Positioning black keys (for 1 octave C-C roughly) */
        .bk-1 { left: 9.5%; } /* C# */
        .bk-2 { left: 22%; }  /* D# */
        .bk-3 { left: 47%; }  /* F# */
        .bk-4 { left: 59.5%; }/* G# */
        .bk-5 { left: 72%; }  /* A# */

    </style>
</head>
<body>

<div class="synth-container">
    <div class="header">
        <h1>PRA32-U2 WEB SYNTH</h1>
        <button class="mutate-btn" id="circuitBendBtn">CIRCUIT BEND</button>
    </div>

    <div class="top-controls">
        <div class="preset-row">
            <label style="color: var(--accent-color); font-size: 0.9rem;">PRESET</label>
            <select id="presetSelect">
                <option value="-1">-- Custom --</option>
            </select>
        </div>
        <div class="status-bar" id="statusDisplay">
            Status: INITIALIZING...
        </div>
    </div>

    <div class="tabs" id="tabsContainer">
        <!-- Tabs generated dynamically by JS -->
    </div>

    <div id="tabContentsContainer" style="flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;">
        <!-- Tab contents generated dynamically by JS -->
    </div>

    <!-- Fixed Keyboard -->
    <div id="keyboard">
        <div class="key white-key" data-note="60"></div>
        <div class="key black-key bk-1" data-note="61"></div>
        <div class="key white-key" data-note="62"></div>
        <div class="key black-key bk-2" data-note="63"></div>
        <div class="key white-key" data-note="64"></div>
        <div class="key white-key" data-note="65"></div>
        <div class="key black-key bk-3" data-note="66"></div>
        <div class="key white-key" data-note="67"></div>
        <div class="key black-key bk-4" data-note="68"></div>
        <div class="key white-key" data-note="69"></div>
        <div class="key black-key bk-5" data-note="70"></div>
        <div class="key white-key" data-note="71"></div>
        <div class="key white-key" data-note="72"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
